<svg xmlns="http://w3.org" viewBox="0 0 800 400" width="100%" height="100%">
  <!-- Fond sombre pour faire ressortir le logo -->
  <rect width="100%" height="100%" fill="#1E222B" rx="10"/>

  <defs>
    <!-- Dégradé de la flamme -->
    <linearGradient id="emberGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D32F2F" />
      <stop offset="60%" stop-color="#FF6D00" />
      <stop offset="100%" stop-color="#FFD600" />
    </linearGradient>
  </defs>

  <g transform="translate(40, 50)">
    <!-- Dessin propre de la flamme modernisée -->
    <path d="M 150,300 
             C 80,280 40,200 80,120 
             C 60,160 70,210 110,230 
             C 90,150 120,80 160,20 
             C 140,80 160,130 190,160 
             C 170,110 200,60 240,50 
             C 210,110 250,180 240,240 
             C 230,300 190,310 150,300 Z" 
          fill="url(#emberGrad)" />
          
    <!-- Texte principal (Nom de l'éditeur) -->
    <text x="290" y="165" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="96" font-weight="700" fill="#FFFFFF" letter-spacing="1">Ember</text>
    
    <!-- Sous-texte -->
    <text x="292" y="220" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="500" fill="#CFD8DC" letter-spacing="6">MODERN CODE EDITOR</text>
  </g>
</svg>
